<template>
  <lightning-card title="AI 고객 피드백 요약" icon-name="utility:einstein">
    <div class="slds-p-around_medium">
      <template if:true={isLoading}>
        <lightning-spinner
          alternative-text="AI 요약 생성 중..."
          size="small"
        ></lightning-spinner>
        <p class="slds-text-color_weak slds-m-top_small">
          AI가 피드백을 분석하고 있습니다...
        </p>
      </template>
      <template if:false={isLoading}>
        <template if:true={summary}>
          <div class="slds-box slds-theme_shade">
            <lightning-formatted-rich-text
              value={summaryHtml}
            ></lightning-formatted-rich-text>
          </div>
        </template>
        <template if:false={summary}>
          <p class="slds-text-color_weak">고객 의견이 없습니다.</p>
        </template>
      </template>
      <div class="slds-m-top_medium">
        <lightning-button
          label="AI 요약 생성"
          onclick={generateSummary}
          variant="brand"
          icon-name="utility:einstein"
        >
        </lightning-button>
      </div>
    </div>
  </lightning-card>
</template>
